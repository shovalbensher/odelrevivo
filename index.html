<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אודל רביבו - The Moment</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow-x: hidden; background-color: #ffffff; }
        .bg {
            background-image: url("bg.jpg");
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background-position: center top;
            background-repeat: no-repeat;
            background-size: contain;
            position: relative;
            margin: 0 auto;
        }
        .link-box {
            position: absolute;
            left: 10%; width: 80%;
            height: 5%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="bg">
        <a href="#" class="link-box" style="top: 29%;"></a> <a href="#" class="link-box" style="top: 33.5%;"></a> <a href="#" class="link-box" style="top: 38%;"></a> <a href="#" class="link-box" style="top: 42.5%;"></a> </div>
</body>
</html>
